name: deploy-to-github-pages
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: npm
      - run: npm install
      - run: npm install typescript
      - run: npx tsc
      - run: rm -r node_modules scripts
      - uses: actions/upload-pages-artifact@v5
        with:
          path: .
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: '${{ steps.deployment.outputs.page_url }}'
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
